name: Android Release Build

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: goose-android-agent

jobs:
  build-and-release:
    name: Build APK and Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        
      - name: Get short commit hash
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          tag_name: release-${{ steps.commit.outputs.sha }}
          name: Release ${{ steps.date.outputs.date }} (${{ steps.commit.outputs.sha }})
          body: |
            This is an automated build of the app.
            Commit: ${{ github.sha }}
            Date: ${{ steps.date.outputs.date }}
          files: goose-android-agent/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: app-debug
          path: goose-android-agent/app/build/outputs/apk/debug/app-debug.apk
